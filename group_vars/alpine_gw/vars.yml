# ── Network ────────────────────────────────────────────────────────────────────
network_interface: eth0

# ── SSH ────────────────────────────────────────────────────────────────────────
ssh_port: 22

# ── Inbound ports ──────────────────────────────────────────────────────────────
http_port: 80
https_port: 443

# ── Caddy ──────────────────────────────────────────────────────────────────────
caddy_config_dir: /etc/caddy
caddy_log_dir: /var/log/caddy
